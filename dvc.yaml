stages:
  data_ingestion:
    cmd: python scr/data_ingestion.py
    deps:
    - scr/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw
  data_preprocessing:
    cmd: python scr/data_preprocessing.py
    deps:
    - data/raw
    - scr/data_preprocessing.py
    outs:
    - data/interim
  feature_engineering:
    cmd: python scr/feature_engineering.py
    deps:
    - data/interim
    - scr/feature_engineering.py
    params:
    - feature_engineering.max_features
    outs:
    - data/processed
  model_building:
    cmd: python scr/model_building.py
    deps:
    - data/processed
    - scr/model_building.py
    params:
    - model_building.n_estimators
    - model_building.random_state
    outs:
    - models/model.pkl
  model_evaluation:
    cmd: python scr/model_evaluation.py
    deps:
    - models/model.pkl
    - scr/model_evaluation.py
    metrics:
    - reports/metrics.json
params:
- dvclive/params.yaml
metrics:
- dvclive/metrics.json
plots:
- dvclive/plots/metrics:
    x: step
